name: CI

# 触发条件：push 到主分支，或者向主分支发起 PR 时运行
on:
  push:
    branches: ["main", "master"]
  pull_request:

# 取消同一分支上正在进行的旧任务，节省 CI 资源
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------- 代码格式检查 ----------
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      # fmt 只检查格式，不需要系统依赖，跑得很快
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ---------- Clippy 静态检查 ----------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # clippy 需要真正编译代码，因此要装 slint / rodio 所需系统依赖
      # 注意：ffmpeg 不走 apt（版本太旧），改用下面的 setup-ffmpeg 提供 7.x
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libfontconfig1-dev \
            libasound2-dev

      # 安装 FFmpeg 7.x 的共享库（含头文件与 pkg-config 文件）
      - name: Setup FFmpeg
        id: ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release
          linking-type: shared

      # setup-ffmpeg 的预编译包不含 pkg-config 的 .pc 文件，
      # 因此改用 ffmpeg-sys-next 支持的 FFMPEG_DIR 变量，让它直接按目录链接。
      - name: Export FFmpeg env
        run: |
          FF_DIR="${{ steps.ffmpeg.outputs.ffmpeg-path }}"
          echo "FFmpeg dir = ${FF_DIR}"
          echo "----- 目录结构 (方便排查) -----"
          ls -R "${FF_DIR}" | head -n 60
          echo "FFMPEG_DIR=${FF_DIR}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${FF_DIR}/lib" >> "$GITHUB_ENV"

      # 缓存依赖编译结果，加速后续 CI
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
